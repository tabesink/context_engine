services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres.Dockerfile
    image: context-engine-postgres-age-vector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-context_engine}
      POSTGRES_USER: ${POSTGRES_USER:-context_engine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-context_engine}
    ports:
      - "${PUBLISH_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-context_engine} -d ${POSTGRES_DB:-context_engine}"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - context_engine_lightrag
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${PUBLISH_REDIS_PORT:-6386}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - context_engine_lightrag
    restart: unless-stopped

  migrate:
    build: .
    command: alembic upgrade head
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-context_engine}:${POSTGRES_PASSWORD:-context_engine}@postgres:5432/${POSTGRES_DB:-context_engine}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - context_engine_lightrag

  api:
    build: .
    command: uvicorn app.main:create_app --factory --host 0.0.0.0 --port ${API_PORT:-8010}
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-context_engine}:${POSTGRES_PASSWORD:-context_engine}@postgres:5432/${POSTGRES_DB:-context_engine}
      REDIS_URL: redis://redis:6379/0
      LIGHTRAG_DOCKER_EXECUTION_MODE: socket
    ports:
      - "${API_PORT:-8010}:${API_PORT:-8010}"
    volumes:
      - uploads:/app/.data/uploads
      - lightrag-data:/app/.data/lightrag
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - context_engine_lightrag
    restart: unless-stopped

  worker:
    build: .
    command: python -m app.workers.worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-context_engine}:${POSTGRES_PASSWORD:-context_engine}@postgres:5432/${POSTGRES_DB:-context_engine}
      REDIS_URL: redis://redis:6379/0
      LIGHTRAG_DOCKER_EXECUTION_MODE: socket
    volumes:
      - uploads:/app/.data/uploads
      - lightrag-data:/app/.data/lightrag
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - context_engine_lightrag
    restart: unless-stopped

  status-poller:
    build: .
    command: python -m app.workers.status_poller
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-context_engine}:${POSTGRES_PASSWORD:-context_engine}@postgres:5432/${POSTGRES_DB:-context_engine}
      REDIS_URL: redis://redis:6379/0
      LIGHTRAG_DOCKER_EXECUTION_MODE: socket
    volumes:
      - uploads:/app/.data/uploads
      - lightrag-data:/app/.data/lightrag
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - context_engine_lightrag
    restart: unless-stopped

volumes:
  postgres-data:
  uploads:
  lightrag-data:

networks:
  context_engine_lightrag:
    name: ${LIGHTRAG_DOCKER_NETWORK:-context_engine_lightrag}

