services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-context_engine}
      POSTGRES_USER: ${POSTGRES_USER:-context_engine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-context_engine}
    ports:
      - "${PUBLISH_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${PUBLISH_REDIS_PORT:-6386}:6379"

  api:
    build: .
    command: uvicorn app.main:create_app --factory --host 0.0.0.0 --port ${API_PORT:-8000} --reload
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    volumes:
      - .:/app
      - uploads:/app/.data/uploads
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: python -m app.workers.worker
    env_file:
      - .env
    volumes:
      - .:/app
      - uploads:/app/.data/uploads
    depends_on:
      - postgres
      - redis

volumes:
  postgres-data:
  uploads:

