services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres.Dockerfile
    image: context-engine-postgres-age-vector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-context_engine}
      POSTGRES_USER: ${POSTGRES_USER:-context_engine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-context_engine}
    ports:
      - "${PUBLISH_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - context_engine_lightrag

  redis:
    image: redis:7-alpine
    ports:
      - "${PUBLISH_REDIS_PORT:-6386}:6379"
    networks:
      - context_engine_lightrag

  migrate:
    build: .
    command: alembic upgrade head
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-context_engine}:${POSTGRES_PASSWORD:-context_engine}@postgres:5432/${POSTGRES_DB:-context_engine}
    depends_on:
      - postgres
    networks:
      - context_engine_lightrag

  api:
    build: .
    command: uvicorn app.main:create_app --factory --host 0.0.0.0 --port ${API_PORT:-8000}
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-context_engine}:${POSTGRES_PASSWORD:-context_engine}@postgres:5432/${POSTGRES_DB:-context_engine}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    volumes:
      - uploads:/app/.data/uploads
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    networks:
      - context_engine_lightrag

  worker:
    build: .
    command: python -m app.workers.worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-context_engine}:${POSTGRES_PASSWORD:-context_engine}@postgres:5432/${POSTGRES_DB:-context_engine}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - uploads:/app/.data/uploads
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    networks:
      - context_engine_lightrag

volumes:
  postgres-data:
  uploads:

networks:
  context_engine_lightrag:
    name: ${LIGHTRAG_DOCKER_NETWORK:-context_engine_lightrag}

